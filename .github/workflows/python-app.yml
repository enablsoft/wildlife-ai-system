# Install dependencies, lint, and run tests on pushes/PRs to main.
# If workflows do not run: repo Settings → Actions → General → allow Actions.
# Use checkout@v5 for current Actions runner Node runtime (see GitHub changelog).

name: Python application

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: requirements-webapp.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest httpx
          pip install -r requirements-webapp.txt

      - name: Lint with flake8
        run: |
          flake8 webapp tests --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 webapp tests --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Test with pytest
        run: pytest -q
