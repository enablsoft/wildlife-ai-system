services:
  ml-service:
    image: ${ML_SERVICE_IMAGE:?Set ML_SERVICE_IMAGE in .env}
    container_name: wildlife-ai-ml-service
    ports:
      - "${ML_SERVICE_PORT:-8010}:8000"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)",
        ]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 180s

  species-service:
    image: ${SPECIES_SERVICE_IMAGE:-ghcr.io/enablsoft/wildlife-ai-species-service:local}
    container_name: wildlife-ai-species-service
    profiles: ["species"]
    ports:
      - "${SPECIES_SERVICE_PORT:-8100}:8001"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=5)",
        ]
      interval: 20s
      timeout: 10s
      retries: 8
      start_period: 180s

  batch-ui:
    image: ${BATCH_UI_IMAGE:?Set BATCH_UI_IMAGE in .env}
    container_name: wildlife-ai-batch-ui
    ports:
      - "${BATCH_UI_PORT:-8090}:8080"
    restart: unless-stopped
    depends_on:
      ml-service:
        condition: service_healthy
    volumes:
      - ${HOST_DATA_DIR:-./data}:/data
      - ${HOST_MEDIA_DIR:-./media}:/data/media
      - ${HOST_CONFIG_DIR:-./config}:/app/config:ro
